services:
  - type: web
    name: vetsystem-api
    env: node
    region: oregon
    plan: free
    buildCommand: >-
      npm install &&
      npm run build:packages &&
      npx prisma generate --schema=apps/api/prisma/schema.prisma &&
      cd apps/api && npx nest build
    startCommand: >-
      npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma &&
      node apps/api/dist/main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: TEMP_TOKEN_EXPIRY
        value: 5m
      - key: WEB_URL
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_FILE_SIZE_MB
        value: 10
